<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>썸네일 - NEAGO DESIGN</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Great+Vibes&family=Noto+Sans+KR:wght@300;400;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Noto Sans KR', sans-serif; background: #000; color: #fff; }

        /* 네비 */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: #000; border-bottom: 2px solid var(--gold); }
        .logo { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900; text-decoration: none; background: linear-gradient(135deg, #d4af37, #c5a059); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav ul { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; align-items: center; }

        /* 드롭다운 */
        .dropdown { position: relative; }
        .dropbtn { padding: 8px 20px; border: 2px solid var(--gold); border-radius: 5px; background: transparent; color: #fff; font-weight: 900; cursor: pointer; font-size: 1rem; outline: none; font-family: 'Noto Sans KR', sans-serif; }
        .dropdown-menu { display: none; position: absolute; background-color: #111; min-width: 140px; box-shadow: 0 8px 16px rgba(0,0,0,0.8); z-index: 2000; border: 1px solid var(--gold); top: 50px; left: 0; border-radius: 5px; }
        .dropdown-menu a { color: #888; padding: 12px 16px; text-decoration: none; display: block; font-size: 14px; font-weight: bold; }
        .dropdown-menu a:hover { color: #fff; background: #222; }
        .call-btn { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); color: #000 !important; padding: 8px 15px; border-radius: 5px; text-decoration: none; font-weight: 900; }

        /* 갤러리 */
        .gallery-section { padding: 80px 20px; text-align: center; }
        .section-title { font-family: 'Cinzel', serif; font-size: 2rem; color: var(--gold); margin-bottom: 50px; letter-spacing: 5px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .gallery-card { border: 1px solid rgba(197,160,89,0.3); overflow: hidden; border-radius: 8px; }
        .gallery-card img { width: 100%; display: block; }

        /* 가격표 */
        .price-section { padding: 80px 20px; text-align: center; background: #050505; }
        .price-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 900px; margin: 0 auto 30px; }
        .price-card { background: #0a0a0a; border: 1px solid rgba(197,160,89,0.3); padding: 30px 20px; border-radius: 10px; }
        .price-card-best { border-color: var(--gold); }
        .price-qty { font-family: 'Cinzel', serif; color: #888; margin-bottom: 10px; }
        .price-amt { font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900; color: var(--gold); }
        .price-save { font-size: 0.75rem; color: #4caf7d; margin-top: 8px; }

        /* 주문 */
        .offer-section { padding: 80px 20px; display: flex; justify-content: center; }
        #main-section { width: 100%; max-width: 500px; padding: 40px; background: #111; border: 1px solid var(--gold); border-radius: 20px; }
        .offer-title { font-family: 'Great Vibes', cursive; font-size: 42px; text-align: center; margin-bottom: 30px; color: var(--gold); }
        .offer-input { width: 100%; padding: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; outline: none; }
        .submit-btn { width: 100%; padding: 15px; background: var(--gold); border: none; font-weight: 900; cursor: pointer; border-radius: 8px; font-size: 16px; font-family: 'Noto Sans KR', sans-serif; }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .price-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">NEAGO DESIGN</a>
    <ul>
        <li class="dropdown">
            <button class="dropbtn" id="dropbtn">샘플보기</button>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="index.html">홈</a>
                <a href="thumbnail.html">썸네일</a>
                <a href="order.html">주문서</a>
            </div>
        </li>
        <li><a href="tel:010-7928-8645" class="call-btn">010-7928-8645</a></li>
    </ul>
</nav>

<!-- 썸네일 갤러리 -->
<section class="gallery-section">
    <h2 class="section-title">THUMBNAIL</h2>
    <div class="gallery-grid">
        <div class="gallery-card"><img src="thumb1.jpg" onerror="this.parentElement.style.display='none'"></div>
        <div class="gallery-card"><img src="thumb2.jpg" onerror="this.parentElement.style.display='none'"></div>
        <div class="gallery-card"><img src="thumb3.jpg" onerror="this.parentElement.style.display='none'"></div>
    </div>
</section>

<!-- 가격표 -->
<section class="price-section">
    <h2 class="section-title">PRICE</h2>
    <div class="price-grid">
        <div class="price-card">
            <div class="price-qty">1개</div>
            <div class="price-amt">10,000원</div>
        </div>
        <div class="price-card">
            <div class="price-qty">2개</div>
            <div class="price-amt">16,000원</div>
            <div class="price-save">2,000원 절약</div>
        </div>
        <div class="price-card price-card-best">
            <div class="price-qty">3개</div>
            <div class="price-amt">20,000원</div>
            <div class="price-save">10,000원 절약</div>
        </div>
    </div>
</section>

<!-- 주문 -->
<section class="offer-section">
    <div id="main-section">
        <h1 class="offer-title">Design Order</h1>
        <input type="text" id="product-name" class="offer-input" placeholder="어떤 상품인가요?">
        <input type="text" id="user-contact" class="offer-input" placeholder="연락처 010-">
        <button class="submit-btn" onclick="handleSubmit()">상담요청</button>
    </div>
</section>

<script>
(function() {
    // ===== 드롭다운 =====
    var btn = document.getElementById('dropbtn');
    var menu = document.getElementById('dropdownMenu');
    var isOpen = false;

    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        isOpen = !isOpen;
        menu.style.display = isOpen ? 'block' : 'none';
    });

    document.addEventListener('click', function() {
        isOpen = false;
        menu.style.display = 'none';
    });

    // ===== 주문 제출 =====
    window.handleSubmit = async function() {
        var productName = document.getElementById('product-name').value.trim();
        var contact = document.getElementById('user-contact').value.trim();
        if (!productName || !contact) { alert('상품명과 연락처를 입력해주세요.'); return; }
        var now = new Date();
        var dateStr = String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0');
        var text = '🎨 [썸네일페이지_' + dateStr + ']\n\n📦 상품명: ' + productName + '\n📞 연락처: ' + contact;
        try {
            await fetch('https://script.google.com/macros/s/AKfycbymzFquDdmIHcimqhO0LkSgNt8xp5x9f7WCztr9BZJedBfcPVjHlH2d9sI8nK9xkM8JVQ/exec', {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: '7299827824', text: text })
            });
        } catch(e) { console.error(e); }
        alert('상담 요청이 접수되었습니다! 24시간 내 연락드리겠습니다.');
        document.getElementById('product-name').value = '';
        document.getElementById('user-contact').value = '';
    };
})();
</script>
</body>
</html>
