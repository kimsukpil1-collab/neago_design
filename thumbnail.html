
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>neago - Thumbnail</title>
<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }
nav { padding:15px 30px; background:#111; display:flex; justify-content:space-between; align-items:center; }
.logo { font-weight:900; font-size:20px; }
.thumb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:20px; padding:40px; }
.thumb-card img { width:100%; display:block; border-radius:10px; }
.section-title { text-align:center; margin-top:40px; font-size:24px; }
.offer-section { padding:60px 20px; max-width:500px; margin:0 auto; }
input, button { width:100%; padding:12px; margin-bottom:15px; }
button { cursor:pointer; }
</style>
</head>
<body>

<nav>
<div class="logo">neago</div>
</nav>

<h2 class="section-title">THUMBNAIL</h2>
<div class="thumb-grid" id="thumb-grid"></div>

<h2 class="section-title">주문서</h2>
<section class="offer-section">
<input type="text" id="product-name" placeholder="상품명">
<input type="text" id="user-contact" placeholder="연락처">
<button onclick="handleSubmit()">상담요청</button>
</section>

<script>
const BASE = "https://raw.githubusercontent.com/kimsukpil1-collab/neago_design/main/";
const pngNumbers = [23, 25, 26, 28, 29, 31, 32];

const grid = document.getElementById('thumb-grid');

pngNumbers.forEach(n => {
    const card = document.createElement('div');
    card.className = 'thumb-card';
    card.innerHTML = `<img src="${BASE}5%20(${n}).png" alt="썸네일 ${n}" loading="lazy">`;
    grid.appendChild(card);
});

function handleSubmit(){
    const p = document.getElementById('product-name').value.trim();
    const c = document.getElementById('user-contact').value.trim();
    if(!p || !c){ alert("상품명과 연락처를 입력하세요."); return; }
    alert("주문 접수되었습니다.");
    document.getElementById('product-name').value = "";
    document.getElementById('user-contact').value = "";
}
</script>

</body>
</html>
